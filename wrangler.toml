# Repo-root Wrangler config (used by Cloudflare Git: `npx wrangler versions upload`)
# Paths are relative to this file. Local dev from workers/ still uses workers/wrangler.toml.
#
# Docs: docs/CLOUDFLARE_SETUP.md

name = "sfl-digging-hub-api"
main = "workers/src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[[rules]]
type = "Data"
globs = ["**/*.ttf"]
fallthrough = true

# account_id = "7f0e409fd621476eb621ef4c9a436374"

[[d1_databases]]
binding = "DB"
database_name = "sfl-digging-hub"
database_id = "74d3d51c-3a53-44ca-a6ed-497a224897b3"
migrations_dir = "workers/migrations"

[[r2_buckets]]
binding = "SCREENSHOTS"
bucket_name = "sfl-digging-hub-screenshots"

[assets]
directory = "apps/web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[vars]
CORS_ORIGINS = "http://localhost:5173,http://127.0.0.1:5173"
HUB_BASE_URL = "http://localhost:5173"
API_BASE_URL = "http://localhost:8787"
GOOGLE_CLIENT_ID = "725426501556-8g0s8oibhcueqtjpq249f7basjai2n4d.apps.googleusercontent.com"
GOOGLE_REDIRECT_URI = "http://localhost:8787/v1/auth/google/callback"

[dev]
port = 8787

[env.beta]
name = "sfl-digging-hub-api-beta"

[[env.beta.d1_databases]]
binding = "DB"
database_name = "sfl-digging-hub-beta"
database_id = "36a111d2-43a3-44b4-8400-12822da1b3a5"
migrations_dir = "workers/migrations"

[[env.beta.r2_buckets]]
binding = "SCREENSHOTS"
bucket_name = "sfl-digging-hub-screenshots-beta"

[env.beta.assets]
directory = "apps/web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[env.beta.vars]
CORS_ORIGINS = "https://development.d1g.uk,https://beta.d1g.uk,https://d1g.uk,https://hub.d1g.uk,https://beta.hub.d1g.uk,http://localhost:5173"
HUB_BASE_URL = "https://beta.hub.d1g.uk"
API_BASE_URL = "https://beta.api.d1g.uk"
GOOGLE_CLIENT_ID = "725426501556-8g0s8oibhcueqtjpq249f7basjai2n4d.apps.googleusercontent.com"
GOOGLE_REDIRECT_URI = "https://beta.api.d1g.uk/v1/auth/google/callback"

[[env.beta.routes]]
pattern = "beta.hub.d1g.uk"
custom_domain = true

[[env.beta.routes]]
pattern = "beta.api.d1g.uk"
custom_domain = true

[env.production]
name = "sfl-digging-hub-api"

[[env.production.d1_databases]]
binding = "DB"
database_name = "sfl-digging-hub"
database_id = "74d3d51c-3a53-44ca-a6ed-497a224897b3"
migrations_dir = "workers/migrations"

[[env.production.r2_buckets]]
binding = "SCREENSHOTS"
bucket_name = "sfl-digging-hub-screenshots"

[env.production.assets]
directory = "apps/web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[env.production.vars]
CORS_ORIGINS = "https://d1g.uk,https://beta.d1g.uk,https://development.d1g.uk,https://hub.d1g.uk,https://beta.hub.d1g.uk"
HUB_BASE_URL = "https://hub.d1g.uk"
API_BASE_URL = "https://api.d1g.uk"
GOOGLE_CLIENT_ID = "725426501556-8g0s8oibhcueqtjpq249f7basjai2n4d.apps.googleusercontent.com"
GOOGLE_REDIRECT_URI = "https://api.d1g.uk/v1/auth/google/callback"

[[env.production.routes]]
pattern = "hub.d1g.uk"
custom_domain = true

[[env.production.routes]]
pattern = "api.d1g.uk"
custom_domain = true
